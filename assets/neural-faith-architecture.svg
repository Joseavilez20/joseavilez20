<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Neural Faith Architecture - Jose Aviles GitHub Banner</title>
  <desc id="desc">Animated futuristic neural architecture banner connecting AI, software, automation, leadership, and faith foundation.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.32"/>
      <stop offset="38%" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.76"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="0.34"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <style><![CDATA[
      .bg-grid { stroke: #1E293B; stroke-width: 1; opacity: .38; }
      .thin { stroke: url(#lineGlow); stroke-width: 1.4; opacity: .72; stroke-dasharray: 7 12; animation: flow 5s linear infinite; }
      .thin2 { stroke: #22D3EE; stroke-width: 1; opacity: .38; stroke-dasharray: 4 10; animation: flow 7s linear infinite reverse; }
      .node { fill: #22D3EE; filter: url(#glow); animation: pulse 2.8s ease-in-out infinite; }
      .node-purple { fill: #A78BFA; filter: url(#glow); animation: pulse 3.2s ease-in-out infinite; }
      .node-gold { fill: #FACC15; filter: url(#glow); animation: pulse 3.8s ease-in-out infinite; }
      .card { fill: url(#panel); stroke: #334155; stroke-width: 1; filter: url(#softShadow); }
      .card-accent { stroke: #22D3EE; stroke-width: 1.4; opacity: .85; }
      .text-main { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; letter-spacing: 1px; font-weight: 800; }
      .text-sub { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; letter-spacing: .7px; font-weight: 500; }
      .text-small { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; letter-spacing: .6px; font-weight: 600; }
      .tag { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #E0F2FE; font-size: 15px; font-weight: 700; }
      .gold { fill: #FDE68A; }
      .cyan { fill: #67E8F9; }
      .purple { fill: #C4B5FD; }
      .scan { opacity: .16; animation: scan 6s ease-in-out infinite; }
      .float { animation: float 6s ease-in-out infinite; }
      .float2 { animation: float 8s ease-in-out infinite reverse; }
      @keyframes pulse { 0%,100%{opacity:.55; transform:scale(1);} 50%{opacity:1; transform:scale(1.22);} }
      @keyframes flow { to { stroke-dashoffset: -120; } }
      @keyframes scan { 0%,100%{transform:translateY(-55px);} 50%{transform:translateY(62px);} }
      @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
    ]]></style>
  </defs>

  <rect width="1200" height="430" fill="#020617"/>
  <rect width="1200" height="430" fill="url(#halo)"/>

  <!-- background grid -->
  <g opacity="0.56">
    <path class="bg-grid" d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200"/>
    <path class="bg-grid" d="M80 0V430M180 0V430M280 0V430M380 0V430M480 0V430M580 0V430M680 0V430M780 0V430M880 0V430M980 0V430M1080 0V430"/>
  </g>

  <!-- scanning light -->
  <rect class="scan" x="0" y="170" width="1200" height="62" fill="#22D3EE"/>

  <!-- neural network lines -->
  <g>
    <path class="thin" d="M92 85C188 118 220 166 315 181C420 197 486 118 600 137C710 155 752 243 854 252C956 262 1018 176 1123 203"/>
    <path class="thin" d="M84 315C190 245 277 302 363 251C442 205 516 233 600 214C704 188 780 121 886 146C984 169 1040 287 1134 246"/>
    <path class="thin2" d="M145 210C242 136 323 139 410 182C487 220 530 302 614 296C721 288 760 191 842 195C938 199 1016 343 1110 308"/>
    <path class="thin2" d="M205 365C290 318 323 217 420 214C512 211 570 342 660 334C765 325 806 226 900 221C976 218 1045 249 1115 284"/>
  </g>

  <!-- floating nodes left -->
  <g class="float">
    <circle class="node" cx="94" cy="85" r="6"/><circle class="node-purple" cx="315" cy="181" r="5"/><circle class="node" cx="205" cy="365" r="5"/>
    <circle class="node-gold" cx="145" cy="210" r="4"/><circle class="node-purple" cx="363" cy="251" r="6"/>
  </g>
  <!-- floating nodes right -->
  <g class="float2">
    <circle class="node" cx="854" cy="252" r="6"/><circle class="node-purple" cx="886" cy="146" r="5"/><circle class="node-gold" cx="1123" cy="203" r="5"/>
    <circle class="node" cx="1110" cy="308" r="4"/><circle class="node-purple" cx="900" cy="221" r="6"/>
  </g>

  <!-- side labels -->
  <g opacity="0.96">
    <rect x="58" y="114" rx="16" width="205" height="42" fill="#0B1220" stroke="#1E40AF"/>
    <text x="82" y="141" class="tag">AI Prompt Engineering</text>

    <rect x="80" y="248" rx="16" width="146" height="42" fill="#0B1220" stroke="#4C1D95"/>
    <text x="104" y="275" class="tag purple">Data Science</text>

    <rect x="932" y="96" rx="16" width="185" height="42" fill="#0B1220" stroke="#155E75"/>
    <text x="956" y="123" class="tag cyan">Agentic Workflows</text>

    <rect x="916" y="284" rx="16" width="216" height="42" fill="#0B1220" stroke="#713F12"/>
    <text x="940" y="311" class="tag gold">Purposeful Automation</text>
  </g>

  <!-- central architecture panel -->
  <g>
    <rect class="card" x="310" y="76" rx="28" width="580" height="280"/>
    <rect x="331" y="97" rx="22" width="538" height="238" fill="#020617" opacity="0.48" stroke="#1E293B"/>
    <text x="600" y="146" text-anchor="middle" class="text-main" font-size="38">JOSE AVILES</text>
    <text x="600" y="181" text-anchor="middle" class="text-sub" font-size="18">Neural Faith Architecture</text>
    <text x="600" y="210" text-anchor="middle" class="text-small" font-size="13">AI • SOFTWARE • AUTOMATION • LEADERSHIP • PURPOSE</text>

    <!-- architecture blocks -->
    <g>
      <rect x="365" y="241" rx="14" width="122" height="44" fill="#082F49" stroke="#22D3EE"/>
      <text x="426" y="269" text-anchor="middle" class="text-small" font-size="13">AI Agents</text>

      <rect x="518" y="241" rx="14" width="164" height="44" fill="#2E1065" stroke="#A78BFA"/>
      <text x="600" y="269" text-anchor="middle" class="text-small" font-size="13">ML + Data Flows</text>

      <rect x="713" y="241" rx="14" width="122" height="44" fill="#422006" stroke="#FACC15"/>
      <text x="774" y="269" text-anchor="middle" class="text-small" font-size="13">Decisions</text>

      <path class="card-accent" d="M487 263H518M682 263H713"/>
      <circle class="node" cx="502" cy="263" r="3"/><circle class="node-gold" cx="697" cy="263" r="3"/>
    </g>
  </g>

  <!-- faith foundation -->
  <g>
    <rect x="335" y="365" rx="20" width="530" height="46" fill="#111827" stroke="#FACC15" opacity="0.92"/>
    <path d="M377 377v24M365 389h24" stroke="#FDE68A" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>
    <text x="600" y="394" text-anchor="middle" class="text-sub" font-size="15">Foundation: Word of God • Eyes on Jesus Christ • Technology with Purpose</text>
  </g>

  <!-- subtle corner code -->
  <text x="42" y="394" class="text-small" font-size="12" opacity="0.7">build → learn → automate → lead</text>
  <text x="1010" y="394" class="text-small" font-size="12" opacity="0.7">faith → discipline → purpose</text>
</svg>
